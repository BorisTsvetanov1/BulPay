<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BulPay — Digital Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Roboto', sans-serif;
      background: #94A3B8;
    }

    /* Phone shell */
    .phone-shell {
      max-width: 390px;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #EEF2F8;
    }
    @media (min-width: 500px) {
      body { display:flex; align-items:center; justify-content:center; padding:24px; }
      .phone-shell {
        height: 844px;
        width: 390px;
        border-radius: 44px;
        overflow: hidden;
        box-shadow:
          0 0 0 10px #1E293B,
          0 0 0 13px #475569,
          0 40px 100px rgba(0,0,0,.65);
      }
    }

    /* Scroll area */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* Animations */
    .fade-in { animation: fadeUp .22s ease-out both; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .shake { animation: shake .45s ease; }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%    { transform:translateX(-7px); }
      40%    { transform:translateX(7px); }
      60%    { transform:translateX(-5px); }
      80%    { transform:translateX(5px); }
    }
    .spin { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Freeze overlay */
    @keyframes frostIn {
      from { opacity:0; transform:scale(1.06); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes frostOut {
      from { opacity:1; transform:scale(1); }
      to   { opacity:0; transform:scale(1.06); }
    }
    .frost-overlay {
      animation: frostIn .55s cubic-bezier(.25,.8,.25,1) forwards;
    }
    /* Snowflake drift */
    @keyframes snowDrift0 { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 15%{opacity:1} 100%{transform:translate(-8px,14px) rotate(200deg);opacity:.7} }
    @keyframes snowDrift1 { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 15%{opacity:1} 100%{transform:translate(6px,12px) rotate(-180deg);opacity:.7} }
    @keyframes snowDrift2 { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 15%{opacity:1} 100%{transform:translate(-5px,10px) rotate(240deg);opacity:.7} }
    @keyframes snowDrift3 { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 15%{opacity:1} 100%{transform:translate(7px,16px) rotate(-150deg);opacity:.7} }
    @keyframes snowDrift4 { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 15%{opacity:1} 100%{transform:translate(-4px,11px) rotate(180deg);opacity:.7} }
    @keyframes snowDrift5 { 0%{transform:translate(0,0) rotate(0deg);opacity:0} 15%{opacity:1} 100%{transform:translate(5px,13px) rotate(-220deg);opacity:.7} }
    .sf0{animation:snowDrift0 2.2s ease-in-out infinite alternate .0s}
    .sf1{animation:snowDrift1 2.4s ease-in-out infinite alternate .3s}
    .sf2{animation:snowDrift2 2.0s ease-in-out infinite alternate .6s}
    .sf3{animation:snowDrift3 2.5s ease-in-out infinite alternate .1s}
    .sf4{animation:snowDrift4 2.1s ease-in-out infinite alternate .45s}
    .sf5{animation:snowDrift5 2.3s ease-in-out infinite alternate .2s}

    /* Freeze card button pulse when frozen */
    @keyframes icePulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(147,197,253,.5); }
      50%    { box-shadow:0 0 0 6px rgba(147,197,253,0); }
    }
    .freeze-pulse { animation: icePulse 2s ease-in-out infinite; }

    /* PIN keys */
    .pin-key {
      width: 74px; height: 74px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      background: #FFFFFF;
      box-shadow: 0 2px 10px rgba(0,0,0,.10);
      cursor: pointer;
      user-select: none;
      transition: transform .12s, background .1s;
      font-size: 22px; font-weight: 400; color: #111827;
      border: none; outline: none;
    }
    .pin-key:active { transform: scale(.87); background: #EFF6FF; }
    .pin-key.ghost  { background: transparent; box-shadow: none; }

    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #010612; margin: 0 7px;
      transition: all .15s;
    }
    .pin-dot.on  { background: #2563EB; transform: scale(1.15); }
    .pin-dot.err { border-color: #EF4444; background: #EF4444; }

    /* Recipient rows */
    .recip-row { transition: background .12s; cursor: pointer; }
    .recip-row:active { background: #EFF6FF !important; }
    .recip-row.sel { border-left: 3px solid #2563EB; }

    /* Suppress number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    /* ════════════════════════════════════════
       DESIGN TOKENS  (inline – never purged)
    ════════════════════════════════════════ */
    const C = {
      pageBg:    '#EEF2F8',
      headerBg:  '#FFFFFF',
      headerBdr: '1px solid #F3F4F6',
      card1:     'linear-gradient(140deg, #93ADFD 0%, #C98EEF 52%, #F0A8D0 100%)',
      card2:     'linear-gradient(140deg, #6878F5 0%, #9B6BF8 100%)',
      card3:     'linear-gradient(140deg, #3B82F6 0%, #06B6D4 100%)',
      btnPrimary:'#2563EB',
      btnShadow: '0 6px 20px rgba(37,99,235,.38)',
      white:     '#FFFFFF',
      avatarBg:  '#DBEAFE',
      avatarTxt: '#1D4ED8',
      txtPrimary:'#111827',
      txtSecond: '#6B7280',
      txtMuted:  '#9CA3AF',
      border:    '#E5E7EB',
      rowBorder: '#F3F4F6',
      cardShadow:'0 4px 20px rgba(0,0,0,.13)',
    };

    const GRAD = { g1: C.card1, g2: C.card2, g3: C.card3 };

    /* ════════════════════════════════════════
       MOCK DATA
    ════════════════════════════════════════ */
    const PIN  = '1234';
    const USER = { first:'George', last:'Petrov' };

    const SEED_CARDS = [
      { id:'c1', name:'Revolut VISA', last4:'1234', holder:'George Petrov', bal:2450.00, grad:'g1' },
      { id:'c2', name:'DSK VISA',     last4:'5678', holder:'George Petrov', bal:9000.00, grad:'g2' },
    ];

    const SEED_TX = [
      { id:'t1', cid:'c2', who:'Peter Georgiev',     ini:'PG', amt:10.00,   dir:'out', date:'2026-01-05', st:'Completed' },
      { id:'t2', cid:'c2', who:'Nikol Aleksandrova', ini:'NA', amt:24.50,   dir:'out', date:'2025-12-28', st:'Completed' },
      { id:'t3', cid:'c2', who:'Ivan Petrov',         ini:'IP', amt:82.75,   dir:'out', date:'2025-12-22', st:'Completed' },
      { id:'t4', cid:'c1', who:'Salary – Revolut',    ini:'SR', amt:1800.00, dir:'in',  date:'2026-01-15', st:'Completed' },
      { id:'t5', cid:'c1', who:'Elena Petrova',       ini:'EP', amt:120.00,  dir:'out', date:'2026-01-10', st:'Completed' },
      { id:'t6', cid:'c1', who:'Stefan Petrov',       ini:'SP', amt:50.00,   dir:'out', date:'2025-12-30', st:'Completed' },
    ];

    const RECIPIENTS = [
      { id:'r1', name:'Elena Petrova',    phone:'+359 88 123 4567', ini:'EP' },
      { id:'r2', name:'Stefan Petrov',    phone:'+359 87 765 4321', ini:'SP' },
      { id:'r3', name:'Maria Ivanova',    phone:'+359 89 456 7890', ini:'MI' },
      { id:'r4', name:'Landlord Dimitar', phone:'+359 88 234 5678', ini:'DK' },
    ];

    /* ════════════════════════════════════════
       STORE
    ════════════════════════════════════════ */
    const Store = {
      cards:   ()  => { try { return JSON.parse(localStorage.getItem('bp_c'))  || SEED_CARDS; } catch { return SEED_CARDS; } },
      setCards:(v) => { try { localStorage.setItem('bp_c', JSON.stringify(v));  } catch {} },
      tx:      ()  => { try { return JSON.parse(localStorage.getItem('bp_t'))  || SEED_TX;    } catch { return SEED_TX;    } },
      addTx:   (t) => { const a=Store.tx(); try { localStorage.setItem('bp_t', JSON.stringify([t,...a])); } catch {} },
      draft:   ()  => { try { return JSON.parse(sessionStorage.getItem('bp_d'))|| null;        } catch { return null; } },
      setDraft:(v) => { try { sessionStorage.setItem('bp_d', JSON.stringify(v));} catch {} },
      delDraft:()  => { try { sessionStorage.removeItem('bp_d');                } catch {} },
    };

    /* ════════════════════════════════════════
       UTILS
    ════════════════════════════════════════ */
    const fmtEur  = (n) => '€' + Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,' ');
    const fmtDate = (s) => s.slice(0,10);
    const genRef  = ()  => 'BUL-' + Math.random().toString(36).slice(2,8).toUpperCase();
    const greet   = ()  => { const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; };

    /* ════════════════════════════════════════
       SHARED COMPONENTS
    ════════════════════════════════════════ */

    /* ── App Header ── */
    function AppHeader({ onBack }) {
      return (
        <div style={{ background:C.headerBg, borderBottom:C.headerBdr, flexShrink:0, position:'relative' }}
             className="flex items-center justify-between px-5 py-4">
          {onBack
            ? <button onClick={onBack} className="flex items-center gap-1 text-sm font-medium"
                      style={{color:C.txtSecond, position:'relative', zIndex:1}}>
                <svg xmlns="http://www.w3.org/2000/svg" className="w-4 h-4" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" strokeWidth={2.5}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7"/>
                </svg>
              </button>
            : <div className="w-6"/>}

          <span style={{
            color: C.txtPrimary, fontSize:17, fontWeight:700,
            position:'absolute', left:'50%', transform:'translateX(-50%)',
          }}>BulPay Wallet</span>

          <div className="flex items-center gap-3">
            <button className="text-sm font-medium" style={{color:C.txtMuted}}>Help</button>
            <button style={{color:C.txtMuted}}>
              <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24"
                   stroke="currentColor" strokeWidth={1.8}>
                <path strokeLinecap="round" strokeLinejoin="round"
                  d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    /* ── Card Visual ── */
    /* Snowflake positions (% from left, % from top) */
    const FLAKES = [
      {l:'12%',t:'18%'}, {l:'55%',t:'10%'}, {l:'82%',t:'30%'},
      {l:'28%',t:'60%'}, {l:'68%',t:'65%'}, {l:'44%',t:'40%'},
    ];

    function CardVisual({ card, onCardClick, showBal, onToggleBal, isFrozen=false, style: extraStyle={} }) {
      const grad = GRAD[card.grad] || GRAD.g1;
      const stopProp = (e) => { e.stopPropagation(); onToggleBal && onToggleBal(); };
      const clickable = !!onCardClick;
      const [hovered, setHovered] = useState(false);

      return (
        <div onClick={onCardClick}
             onMouseEnter={() => clickable && setHovered(true)}
             onMouseLeave={() => setHovered(false)}
             style={{
               background: grad,
               borderRadius: 18,
               padding: '24px 18px 24px',
               color: '#fff',
               position: 'relative',
               overflow: 'hidden',
               cursor: clickable ? 'pointer' : 'default',
               boxShadow: hovered
                 ? '0 12px 36px rgba(0,0,0,.22), 0 2px 8px rgba(0,0,0,.12)'
                 : C.cardShadow,
               userSelect: 'none',
               transform: hovered ? 'translateY(-4px) scale(1.012)' : 'translateY(0) scale(1)',
               transition: 'transform .22s cubic-bezier(.34,1.2,.64,1), box-shadow .22s ease',
               filter: hovered ? 'brightness(1.07)' : 'brightness(1)',
               ...extraStyle,
             }}>
          {/* decorative blobs */}
          <div style={{
            position:'absolute', width:140, height:140, borderRadius:'50%',
            background:'rgba(255,255,255,.15)', top:-30, right:-30, pointerEvents:'none',
          }}/>
          <div style={{
            position:'absolute', width:100, height:100, borderRadius:'50%',
            background:'rgba(255,255,255,.10)', bottom:-28, left:-14, pointerEvents:'none',
          }}/>

          {/* Card icon + name */}
          <div className="flex items-center gap-2 mb-3" style={{position:'relative', zIndex:1}}>
            <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24"
                 stroke="white" strokeWidth={1.8} style={{opacity:.9}}>
              <rect x="2" y="5" width="20" height="14" rx="2"/>
              <path d="M2 10h20"/>
            </svg>
            <span style={{fontWeight:600, fontSize:15, letterSpacing:'.02em'}}>{card.name}</span>
          </div>

          {/* Masked number */}
          <div style={{
            fontFamily:'monospace', fontSize:15, letterSpacing:'.15em',
            opacity:.88, marginBottom:18, position:'relative', zIndex:1,
          }}>
            {'•••• •••• •••• ' + card.last4}
          </div>

          {/* Balance / View Balance — horizontal flip transition */}
          <div style={{
            position:'relative', zIndex:1,
            display:'flex', width:'100%', justifyContent:'flex-end', alignItems:'center',
            height:30, perspective:400,
          }}>

            {/* "View Balance" button — flips away */}
            <button onClick={stopProp} style={{
                position:'absolute', right:0,
                top:'50%', transform: showBal
                  ? 'translateY(-50%) rotateX(90deg)'
                  : 'translateY(-50%) rotateX(0deg)',
                background:'rgba(255,255,255,.22)',
                border:'1px solid rgba(255,255,255,.42)',
                color:'#fff',
                borderRadius:20,
                padding:'5px 16px',
                fontSize:13,
                fontWeight:500,
                cursor:'pointer',
                backdropFilter:'blur(4px)',
                fontFamily:'Roboto,sans-serif',
                transformOrigin:'center center',
                opacity: showBal ? 0 : 1,
                transition: 'transform .22s ease-in, opacity .15s ease-in',
                pointerEvents: showBal ? 'none' : 'auto',
                backfaceVisibility:'hidden',
                whiteSpace:'nowrap',
              }}>
              View Balance
            </button>

            {/* Balance amount — flips in, anchored to same centre */}
            <div onClick={stopProp} style={{
                position:'absolute', right:0,
                top:'50%', transform: showBal
                  ? 'translateY(-50%) rotateX(0deg)'
                  : 'translateY(-50%) rotateX(-90deg)',
                textAlign:'right', cursor:'pointer',
                transformOrigin:'center center',
                opacity: showBal ? 1 : 0,
                transition: showBal
                  ? 'transform .22s ease-out .18s, opacity .15s ease-out .18s'
                  : 'transform .22s ease-in, opacity .15s ease-in',
                pointerEvents: showBal ? 'auto' : 'none',
                backfaceVisibility:'hidden',
                whiteSpace:'nowrap',
              }}>
              <div style={{fontWeight:700, fontSize:13, color:'#fff', letterSpacing:'.01em'}}>
                {fmtEur(card.bal)}
              </div>
            </div>

          </div>

          {/* ── Frozen overlay ── */}
          {isFrozen && (
            <div className="frost-overlay" style={{
              position:'absolute', inset:0, borderRadius:18,
              background:'linear-gradient(135deg,rgba(186,230,253,.55) 0%,rgba(224,242,254,.45) 50%,rgba(186,230,253,.60) 100%)',
              backdropFilter:'blur(2px)',
              zIndex:10,
              display:'flex', alignItems:'center', justifyContent:'center',
              pointerEvents:'none',
            }}>
              {/* Snowflakes */}
              {FLAKES.map((f,i)=>(
                <span key={i} className={`sf${i}`} style={{
                  position:'absolute', left:f.l, top:f.t,
                  fontSize: i%2===0 ? 18 : 14,
                  filter:'drop-shadow(0 0 3px rgba(147,197,253,.9))',
                  userSelect:'none',
                }}>❄</span>
              ))}
              {/* Frozen label */}
              <div style={{
                background:'rgba(255,255,255,.55)',
                backdropFilter:'blur(6px)',
                border:'1px solid rgba(147,197,253,.7)',
                borderRadius:20,
                padding:'5px 16px',
                fontSize:13, fontWeight:600,
                color:'#1e40af',
                letterSpacing:'.03em',
              }}>
                ❄ Card Frozen
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── Primary Button ── */
    function PrimaryBtn({ onClick, disabled, loading, children, style:s={} }) {
      return (
        <button onClick={!disabled && !loading ? onClick : undefined}
                style={{
                  background: disabled ? '#D1D5DB' : C.btnPrimary,
                  color: disabled ? '#9CA3AF' : '#fff',
                  boxShadow: disabled ? 'none' : C.btnShadow,
                  borderRadius: 16,
                  padding: '15px 20px',
                  fontWeight: 600,
                  fontSize: 15,
                  width: '100%',
                  border: 'none',
                  cursor: disabled ? 'not-allowed' : 'pointer',
                  display:'flex', alignItems:'center', justifyContent:'center', gap:8,
                  fontFamily:'Roboto,sans-serif',
                  transition:'transform .12s, opacity .12s',
                  ...s,
                }}>
          {loading && <div className="w-5 h-5 rounded-full border-2 border-white/30 border-t-white spin"/>}
          {children}
        </button>
      );
    }

    /* ── Outline Button ── */
    function OutlineBtn({ onClick, children, icon }) {
      return (
        <button onClick={onClick}
                style={{
                  flex:1, background:C.white, border:'1px solid '+C.border,
                  borderRadius:14, padding:'13px 10px',
                  fontSize:14, fontWeight:500, color:'#374151',
                  cursor:'pointer', display:'flex', alignItems:'center',
                  justifyContent:'center', gap:6, fontFamily:'Roboto,sans-serif',
                  transition:'background .12s',
                }}>
          {icon}
          {children}
        </button>
      );
    }

    /* ── Disabled Biometric Button ── */
    function BiometricBtn({ label='Use face / fingerprint' }) {
      const [toast,setToast] = useState(false);
      const tap = () => { setToast(true); setTimeout(()=>setToast(false),2400); };
      return (
        <div style={{position:'relative'}}>
          <button onClick={tap} style={{
            width:'100%', display:'flex', flexDirection:'column', alignItems:'center',
            gap:8, padding:'20px 16px', borderRadius:16,
            border:'2px solid #E5E7EB', background:'#F9FAFB',
            opacity:.38, cursor:'pointer', fontFamily:'Roboto,sans-serif',
          }}>
            {/* Fingerprint SVG */}
            <svg xmlns="http://www.w3.org/2000/svg" style={{width:44,height:44,color:'#9CA3AF'}} fill="none"
                 viewBox="0 0 50 50" stroke="#9CA3AF" strokeWidth="2" strokeLinecap="round">
              <path d="M25 40 C25 40 14 36 14 24 C14 17.4 18.9 12 25 12 C31.1 12 36 17.4 36 24 C36 30 34 35 32 38"/>
              <path d="M20 39 C18 35 17 30 17 24 C17 19 20.6 15 25 15 C29.4 15 33 19 33 24 C33 28 31.5 32 30 35"/>
              <path d="M25 18 C22 18 20 21 20 24 C20 28 21 32 22 35"/>
              <path d="M25 21 C23.3 21 22 22.4 22 24 C22 26.5 22.5 29 23 31"/>
              <path d="M11 18 C9 20.5 8 22.2 8 25 C8 32 11 38 16 42"/>
              <path d="M39 18 C41 20.5 42 22.2 42 25 C42 33 38 39 33 43"/>
              <path d="M18 11 C20.2 9.7 22.5 9 25 9 C32.7 9 39 15.3 39 24"/>
              <path d="M11 11 C8 14 6 18.5 6 23"/>
            </svg>
            <span style={{fontSize:14, fontWeight:500, color:'#6B7280'}}>{label}</span>
          </button>
          {toast && (
            <div style={{
              position:'absolute', bottom:-36, left:'50%', transform:'translateX(-50%)',
              background:'#111827', color:'#fff', fontSize:12, padding:'7px 14px',
              borderRadius:8, whiteSpace:'nowrap', zIndex:20, pointerEvents:'none',
            }}>
              Not available in this web prototype
            </div>
          )}
        </div>
      );
    }

    /* ── Transaction Row ── */
    function TxRow({ tx, onClick }) {
      const isIn = tx.dir === 'in';
      const ini  = tx.ini || tx.who.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return (
        <div onClick={onClick} style={{
          display:'flex', alignItems:'center', padding:'12px 16px',
          borderBottom:'1px solid '+C.rowBorder, background:C.white,
          cursor:'pointer', transition:'background .15s',
        }}
        onMouseEnter={e=>{ e.currentTarget.style.background='#DCE4F7'; e.currentTarget.style.borderBottomColor='#B8C5E8'; }}
        onMouseLeave={e=>{ e.currentTarget.style.background=C.white; e.currentTarget.style.borderBottomColor=C.rowBorder; }}>
          {/* Avatar */}
          <div style={{
            width:40, height:40, borderRadius:'50%', flexShrink:0,
            background:C.avatarBg, color:C.avatarTxt,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:13, fontWeight:600, marginRight:12,
          }}>
            {ini}
          </div>
          {/* Name + date */}
          <div style={{flex:1, minWidth:0}}>

    /* ════════════════════════════════════════
       SCREEN — PIN ENTRY
    ════════════════════════════════════════ */
    function PinScreen({ nav }) {
      const [digits,setDigits] = useState('');
      const [err,setErr]       = useState('');
      const [shake,setShake]   = useState(false);

      const push = (k) => {
        if (digits.length >= 4) return;
        const next = digits + k;
        setDigits(next); setErr('');
        if (next.length === 4) {
          setTimeout(()=>{
            if (next === PIN) { nav('home'); }
            else {
              setShake(true);
              setErr('Incorrect PIN. Please try again.');
              setTimeout(()=>{ setDigits(''); setShake(false); }, 600);
            }
          }, 200);
        }
      };
      const del = () => { setDigits(d=>d.slice(0,-1)); setErr(''); };
      const letters = {'2':'ABC','3':'DEF','4':'GHI','5':'JKL','6':'MNO','7':'PQRS','8':'TUV','9':'WXYZ'};

      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100%',background:C.pageBg}}>
          <AppHeader onBack={()=>nav('login')}/>
          <div style={{flex:1, display:'flex', flexDirection:'column', alignItems:'center', padding:'36px 24px 28px'}}>

            <div style={{fontSize:20, fontWeight:700, color:C.txtPrimary, marginBottom:6}}>Enter your PIN</div>
            <div style={{fontSize:14, color:C.txtSecond, marginBottom:32}}>Enter your 4-digit PIN to continue</div>

            {/* Dots */}
            <div className={shake ? 'shake' : ''}
                 style={{display:'flex', marginBottom:8}}>
              {[0,1,2,3].map(i=>(
                <div key={i} className={`pin-dot ${digits.length>i?(err?'err':'on'):''}`}/>
              ))}
            </div>
            <div style={{
              height:20, fontSize:13, color:'#EF4444', marginBottom:28, textAlign:'center',
              opacity: err ? 1 : 0,
            }}>
              {err||'·'}
            </div>

            {/* Keypad */}
            <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:16}}>
              {['1','2','3','4','5','6','7','8','9'].map(k=>(
                <button key={k} className="pin-key" onClick={()=>push(k)}>
                  <div style={{fontSize:22}}>{k}</div>
                  <div style={{fontSize:8, color:C.txtMuted}}>{letters[k]||''}</div>
                </button>
              ))}
              <div/>
              <button className="pin-key" onClick={()=>push('0')}>0</button>
              <button className="pin-key ghost" onClick={del}>
                <svg xmlns="http://www.w3.org/2000/svg" style={{width:24,height:24}} fill="none"
                     viewBox="0 0 24 24" stroke="#6B7280" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414A2 2 0 0010.828 19H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"/>
                </svg>
              </button>
            </div>

            <div style={{marginTop:28, fontSize:12, color:C.txtMuted}}>
              Demo PIN:&nbsp;
              <span style={{fontFamily:'monospace', background:'#F3F4F6', border:'1px solid #E5E7EB',
                            padding:'2px 8px', borderRadius:6, color:'#374151'}}>
                1234
              </span>
            </div>
          </div>
        </div>
      );
    }

            <WhiteBox style={{marginBottom:8}}>
              <div style={{padding:'14px 16px', display:'flex', alignItems:'center', gap:8}}>
                <span style={{fontSize:24, fontWeight:300, color:'#D1D5DB'}}>€</span>
                <input type="number" min="0" step="0.01"
                       value={amt} onChange={e=>{setAmt(e.target.value);setAmtErr('');}}
                       placeholder="0.00"
                       style={{
                         flex:1, fontSize:24, fontWeight:600, color:C.txtPrimary,
                         border:'none', outline:'none', background:'transparent',
                         fontFamily:'Roboto,sans-serif',
                       }}/>
              </div>
              {amtErr && <div style={{padding:'0 16px 12px',fontSize:12,color:'#EF4444'}}>{amtErr}</div>}
            </WhiteBox>

            <WhiteBox style={{marginBottom:24}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                           padding:'12px 16px', borderBottom:'1px solid '+C.rowBorder}}>
                <span style={{fontSize:14,color:C.txtSecond}}>Fee</span>
                <span style={{fontSize:14,fontWeight:600,color:'#16A34A'}}>€0.00 — No fee!</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px'}}>
                <span style={{fontSize:14,color:C.txtSecond}}>Estimated delivery</span>
                <span style={{fontSize:14,fontWeight:600,color:C.txtPrimary}}>Instant ⚡</span>
              </div>
            </WhiteBox>

            <PrimaryBtn onClick={go} disabled={!canGo}>Continue →</PrimaryBtn>
            <button onClick={()=>nav('card',{cid:card.id})}
                    style={{
                      width:'100%', marginTop:12, padding:'12px',
                      background:'transparent', border:'none',
                      fontSize:14, fontWeight:500, color:C.txtMuted,
                      cursor:'pointer', fontFamily:'Roboto,sans-serif',
                    }}>
              Cancel
            </button>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════
       SCREEN — CONFIRM
    ════════════════════════════════════════ */
    function ConfirmScreen({ nav }) {
      const draft = Store.draft();
      const [showPin,  setShowPin]  = useState(false);
      const [pinVisible, setPinVisible] = useState(false);
      const [busy,     setBusy]     = useState(false);
      if (!draft) { nav('home'); return null; }

      const openPin = () => {
        setShowPin(true);
        requestAnimationFrame(() => setPinVisible(true));
      };
      const closePin = () => {
        setPinVisible(false);
        setTimeout(() => setShowPin(false), 300);
      };

      const onPinSuccess = () => {
        closePin();
        setBusy(true);
        setTimeout(()=>{
          Store.setCards(Store.cards().map(c=>
            c.id===draft.card.id ? {...c, bal:c.bal-draft.amt} : c
          ));
          Store.addTx({
            id:'tx-'+Date.now(), cid:draft.card.id,
            who:draft.recip.name, ini:draft.recip.ini,
            amt:draft.amt, dir:'out',
            date:new Date().toISOString().split('T')[0], st:'Completed'
          });
          nav('success');
        }, 400);
      };

      const rows = [
        { label:'From card',  value:`${draft.card.name} •••• ${draft.card.last4}` },
        { label:'Amount',     value:fmtEur(draft.amt) },
        { label:'Fee',        value:'€0.00', green:true },
        { label:'Total',      value:fmtEur(draft.amt), bold:true },
      ];

      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100%',background:C.pageBg,position:'relative'}}>
          <AppHeader onBack={()=>nav('send',{cid:draft.card.id})}/>

          <div className="scroll-body" style={{padding:'20px 16px 32px'}}>

            {/* Recipient tile */}
            <WhiteBox style={{marginBottom:16, padding:'16px'}}>
              <div style={{display:'flex', alignItems:'center', gap:14}}>
                <div style={{
                  width:54,height:54,borderRadius:'50%',flexShrink:0,
                  background:C.avatarBg, color:C.avatarTxt,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:16, fontWeight:700,
                }}>
                  {draft.recip.ini}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:C.txtMuted}}>Paying</div>
                  <div style={{fontSize:16,fontWeight:700,color:C.txtPrimary}}>{draft.recip.name}</div>
                  <div style={{fontSize:12,color:C.txtMuted,marginTop:2}}>{draft.recip.phone}</div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontSize:11,color:C.txtMuted}}>Amount</div>
                  <div style={{fontSize:20,fontWeight:700,color:C.txtPrimary}}>{fmtEur(draft.amt)}</div>
                </div>
              </div>
            </WhiteBox>

            {/* Details */}
            <WhiteBox style={{marginBottom:20}}>
              {rows.map(({label,value,green,bold,mono},i)=>(
                <div key={label} style={{
                  display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'12px 16px',
                  borderBottom: i<rows.length-1 ? '1px solid '+C.rowBorder : 'none',
                }}>
                  <span style={{fontSize:13,color:C.txtMuted}}>{label}</span>
                  <span style={{
                    fontSize: bold?14:13,
                    fontWeight: bold?700:500,
                    color: green?'#16A34A': bold?C.txtPrimary:'#374151',
                    fontFamily: mono?'monospace':'Roboto,sans-serif',
                  }}>
                    {value}
                  </span>
                </div>
              ))}
            </WhiteBox>

            {/* Biometric */}
            <BiometricBtn label="Use face / fingerprint to confirm"/>
            <div style={{textAlign:'center',fontSize:12,color:C.txtMuted,marginTop:8,marginBottom:20}}>
              Not available in this web prototype
            </div>

            <PrimaryBtn onClick={openPin} loading={busy}>
              {!busy && 'Confirm with PIN'}
            </PrimaryBtn>
            <button onClick={()=>nav('send',{cid:draft.card.id})}
                    style={{
                      width:'100%', marginTop:12, padding:'12px',
                      background:'transparent', border:'none',
                      fontSize:14, fontWeight:500, color:C.txtMuted,
                      cursor:'pointer', fontFamily:'Roboto,sans-serif',
                    }}>
              Cancel
            </button>
          </div>

          {/* ── Confirm PIN sheet ── */}
          {showPin && <ConfirmPinSheet
            visible={pinVisible}
            onSuccess={onPinSuccess}
            onClose={closePin}
            draft={draft}
          />}
        </div>
      );
    }

    /* ── Confirm PIN bottom sheet ── */
    function ConfirmPinSheet({ visible, onSuccess, onClose, draft }) {
      const [digits, setDigits] = useState('');
      const [err,    setErr]    = useState('');
      const [shake,  setShake]  = useState(false);
      const letters = {'2':'ABC','3':'DEF','4':'GHI','5':'JKL','6':'MNO','7':'PQRS','8':'TUV','9':'WXYZ'};

      const push = (k) => {
        if (digits.length >= 4) return;
        const next = digits + k;
        setDigits(next); setErr('');
        if (next.length === 4) {
          setTimeout(() => {
            if (next === PIN) {
              onSuccess();
            } else {
              setShake(true);
              setErr('Incorrect PIN. Please try again.');
              setTimeout(() => { setDigits(''); setShake(false); }, 600);
            }
          }, 200);
        }
      };
      const del = () => { setDigits(d => d.slice(0,-1)); setErr(''); };

      return (
        <>
          {/* Backdrop */}
          <div onClick={onClose} style={{
            position:'absolute', inset:0, zIndex:40,
            background: visible ? 'rgba(0,0,0,.4)' : 'rgba(0,0,0,0)',
            transition:'background .3s ease',
          }}/>

          {/* Sheet */}
          <div style={{
            position:'absolute', bottom:0, left:0, right:0, zIndex:50,
            background: C.white,
            borderRadius:'24px 24px 0 0',
            boxShadow:'0 -4px 32px rgba(0,0,0,.15)',
            transform: visible ? 'translateY(0)' : 'translateY(100%)',
            transition:'transform .3s cubic-bezier(.32,1,.55,1)',
            paddingBottom:24,
          }}>
            {/* Handle */}
            <div style={{display:'flex',justifyContent:'center',padding:'12px 0 4px'}}>
              <div style={{width:40,height:4,borderRadius:2,background:'#E5E7EB'}}/>
            </div>

            {/* Payment summary */}
            <div style={{
              margin:'4px 20px 20px',
              background:C.pageBg, borderRadius:14,
              padding:'12px 16px',
              display:'flex', alignItems:'center', justifyContent:'space-between',
            }}>
              <div style={{display:'flex', alignItems:'center', gap:10}}>
                <div style={{
                  width:36,height:36,borderRadius:'50%',flexShrink:0,
                  background:C.avatarBg, color:C.avatarTxt,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:12, fontWeight:700,
                }}>
                  {draft.recip.ini}
                </div>
                <div>
                  <div style={{fontSize:11,color:C.txtMuted}}>Paying</div>
                  <div style={{fontSize:13,fontWeight:600,color:C.txtPrimary}}>{draft.recip.name}</div>
                </div>
              </div>
              <div style={{fontSize:18,fontWeight:700,color:C.txtPrimary}}>{fmtEur(draft.amt)}</div>
            </div>

            {/* Title */}
            <div style={{textAlign:'center',fontSize:16,fontWeight:700,color:C.txtPrimary,marginBottom:4}}>
              Enter your PIN
            </div>
            <div style={{textAlign:'center',fontSize:13,color:C.txtMuted,marginBottom:20}}>
              Confirm this payment with your PIN
            </div>

            {/* Dots */}
            <div className={shake?'shake':''} style={{display:'flex',justifyContent:'center',marginBottom:6}}>
              {[0,1,2,3].map(i=>(
                <div key={i} className={`pin-dot ${digits.length>i?(err?'err':'on'):''}`}/>
              ))}
            </div>
            <div style={{
              height:20,fontSize:12,color:'#EF4444',
              textAlign:'center',marginBottom:16,
              opacity: err ? 1 : 0,
            }}>
              {err||'·'}
            </div>

            {/* Keypad */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,padding:'0 32px'}}>
              {['1','2','3','4','5','6','7','8','9'].map(k=>(
                <button key={k} className="pin-key" onClick={()=>push(k)}
                        style={{margin:'0 auto'}}>
                  <div style={{fontSize:22}}>{k}</div>
                  <div style={{fontSize:8,color:C.txtMuted}}>{letters[k]||''}</div>
                </button>
              ))}
              <div/>
              <button className="pin-key" onClick={()=>push('0')} style={{margin:'0 auto'}}>0</button>
              <button className="pin-key ghost" onClick={del} style={{margin:'0 auto'}}>
                <svg xmlns="http://www.w3.org/2000/svg" style={{width:24,height:24}} fill="none"
                     viewBox="0 0 24 24" stroke="#6B7280" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round"
                    d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414A2 2 0 0010.828 19H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"/>
                </svg>
              </button>
            </div>
          </div>
        </>
      );
    }

    /* ════════════════════════════════════════
       SCREEN — SUCCESS
    ════════════════════════════════════════ */
    function SuccessScreen({ nav }) {
      const draft = Store.draft();
      useEffect(()=>()=>Store.delDraft(),[]);
      if (!draft) { nav('home'); return null; }

      const dateStr = new Date().toLocaleString('en-GB',{
        day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
      });

      const rows = [
        { label:'Amount sent', value:fmtEur(draft.amt), green:true, bold:true },
        { label:'To',          value:draft.recip.name },
        { label:'From card',   value:'•••• '+draft.card.last4 },
        { label:'Fee',         value:'€0.00', green:true },
        { label:'Reference',   value:draft.ref, mono:true },
        { label:'Date & Time', value:dateStr },
      ];

      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100%',background:C.pageBg}}>
          <AppHeader/>
          <div className="scroll-body" style={{padding:'32px 20px 32px', display:'flex', flexDirection:'column', alignItems:'center'}}>

            {/* Checkmark */}
            <div style={{
              width:88,height:88,borderRadius:'50%',background:'#DCFCE7',
              display:'flex',alignItems:'center',justifyContent:'center',
              boxShadow:'0 8px 28px rgba(22,163,74,.2)', marginBottom:14,
            }}>
              <div style={{
                width:60,height:60,borderRadius:'50%',background:'#16A34A',
                display:'flex',alignItems:'center',justifyContent:'center',
              }}>
                <svg xmlns="http://www.w3.org/2000/svg" style={{width:32,height:32}} fill="none"
                     viewBox="0 0 24 24" stroke="white" strokeWidth={3}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
            </div>
            <div style={{fontSize:20,fontWeight:700,color:C.txtPrimary,marginBottom:4}}>Payment Sent!</div>
            <div style={{fontSize:14,color:C.txtMuted,marginBottom:24}}>Your payment was successful</div>

            {/* Receipt */}
            <WhiteBox style={{width:'100%',marginBottom:20}}>
              <div style={{
                padding:'12px 16px',borderBottom:'1px dashed #E5E7EB',
                background:'#F9FAFB',
              }}>
                <div style={{fontSize:11,fontWeight:600,color:C.txtMuted,
                             textAlign:'center',textTransform:'uppercase',letterSpacing:'.07em'}}>
                  Receipt
                </div>
              </div>
              {rows.map(({label,value,green,bold,mono},i)=>(
                <div key={label} style={{
                  display:'flex',justifyContent:'space-between',alignItems:'center',
                  padding:'12px 16px',
                  borderBottom: i<rows.length-1 ? '1px solid '+C.rowBorder : 'none',
                }}>
                  <span style={{fontSize:13,color:C.txtMuted}}>{label}</span>
                  <span style={{
                    fontSize: bold?16:13,
                    fontWeight: bold?700:500,
                    color: green?'#16A34A': C.txtPrimary,
                    fontFamily: mono?'monospace':'Roboto,sans-serif',
                  }}>
                    {value}
                  </span>
                </div>
              ))}
            </WhiteBox>

            <PrimaryBtn onClick={()=>nav('home')}>Done</PrimaryBtn>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════
       SCREEN — ADD CARD
    ════════════════════════════════════════ */
    function AddCardScreen({ nav }) {
      const [f,setF]      = useState({num:'',name:'',exp:'',cvv:''});
      const [errs,setErrs]= useState({});
      const [busy,setBusy]= useState(false);

      const upd = (key) => (e) => {
        let v = e.target.value;
        if (key==='num') v=v.replace(/\D/g,'').slice(0,16).replace(/(.{4})/g,'$1 ').trim();
        if (key==='exp') v=v.replace(/\D/g,'').slice(0,4).replace(/^(\d{2})(\d)/,'$1/$2');
        if (key==='cvv') v=v.replace(/\D/g,'').slice(0,3);
        setF(p=>({...p,[key]:v}));
        setErrs(p=>({...p,[key]:''}));
      };

      const validate = () => {
        const e={};
        if (f.num.replace(/\s/g,'').length<16) e.num='Enter a valid 16-digit number';
        if (!f.name.trim())                    e.name='Enter cardholder name';
        if (f.exp.length<5)                    e.exp='Enter expiry MM/YY';
        if (f.cvv.length<3)                    e.cvv='Enter 3-digit CVV';
        setErrs(e); return Object.keys(e).length===0;
      };

      const add = () => {
        if (!validate()) return;
        setBusy(true);
        setTimeout(()=>{
          Store.setCards([...Store.cards(),{
            id:'c-'+Date.now(), name:'BulPay VISA',
            last4:f.num.replace(/\s/g,'').slice(-4),
            holder:f.name, bal:0, grad:'g3'
          }]);
          nav('home');
        },1000);
      };

      const fieldStyle = (key) => ({
        width:'100%', padding:'12px 14px',
        background:C.white, border:'1px solid '+(errs[key]?'#EF4444':C.border),
        borderRadius:12, fontSize:14, color:C.txtPrimary,
        outline:'none', fontFamily:'Roboto,sans-serif',
        boxSizing:'border-box',
      });
      const labelStyle = {
        fontSize:11, fontWeight:600, color:C.txtMuted,
        textTransform:'uppercase', letterSpacing:'.06em',
        display:'block', marginBottom:6,
      };

      return (
        <div className="fade-in" style={{display:'flex',flexDirection:'column',minHeight:'100%',background:C.pageBg}}>
          <AppHeader onBack={()=>nav('home')}/>

          <div className="scroll-body" style={{padding:'20px 16px 32px'}}>

            {/* Add methods */}
            <SectionLabel>Add Card Via</SectionLabel>
            <div style={{display:'flex', gap:12, marginBottom:24}}>
              {[{icon:'📷',label:'Photo'},{icon:'📡',label:'NFC Scan'}].map(m=>(
                <div key={m.label} style={{
                  flex:1, background:C.white, borderRadius:12, padding:'12px 8px',
                  display:'flex', flexDirection:'column', alignItems:'center', gap:4,
                  opacity:.38, border:'1px solid '+C.border, position:'relative',
                }}>
                  <span style={{fontSize:22}}>{m.icon}</span>
                  <span style={{fontSize:12,color:C.txtMuted}}>{m.label}</span>
                  <span style={{
                    position:'absolute', top:-8, right:-8,
                    background:C.btnPrimary, color:'#fff', fontSize:9,
                    padding:'2px 6px', borderRadius:10, fontWeight:600,
                  }}>App only</span>
                </div>
              ))}
              <div style={{
                flex:1, background:C.white, borderRadius:12, padding:'12px 8px',
                display:'flex', flexDirection:'column', alignItems:'center', gap:4,
                border:'2px solid '+C.btnPrimary,
              }}>
                <span style={{fontSize:22}}>⌨️</span>
                <span style={{fontSize:12, fontWeight:600, color:C.btnPrimary}}>Manual</span>
              </div>
            </div>

            <SectionLabel>Card Details</SectionLabel>

            <div style={{marginBottom:16}}>
              <label style={labelStyle}>Card Number</label>
              <input value={f.num} onChange={upd('num')} placeholder="0000 0000 0000 0000"
                     style={fieldStyle('num')}/>
              {errs.num && <div style={{fontSize:12,color:'#EF4444',marginTop:4}}>{errs.num}</div>}
            </div>

            <div style={{marginBottom:16}}>
              <label style={labelStyle}>Cardholder Name</label>
              <input value={f.name} onChange={upd('name')} placeholder="Full name as on card"
                     style={fieldStyle('name')}/>
              {errs.name && <div style={{fontSize:12,color:'#EF4444',marginTop:4}}>{errs.name}</div>}
            </div>

            <div style={{display:'flex', gap:12, marginBottom:24}}>
              <div style={{flex:1}}>
                <label style={labelStyle}>Expiry</label>
                <input value={f.exp} onChange={upd('exp')} placeholder="MM/YY" inputMode="numeric"
                       style={fieldStyle('exp')}/>
                {errs.exp && <div style={{fontSize:12,color:'#EF4444',marginTop:4}}>{errs.exp}</div>}
              </div>
              <div style={{flex:1}}>
                <label style={labelStyle}>CVV</label>
                <input value={f.cvv} onChange={upd('cvv')} placeholder="•••"
                       inputMode="numeric" type="password"
                       style={fieldStyle('cvv')}/>
                {errs.cvv && <div style={{fontSize:12,color:'#EF4444',marginTop:4}}>{errs.cvv}</div>}
              </div>
            </div>

            <PrimaryBtn onClick={add} loading={busy}>
              {!busy && 'Add Card'}
            </PrimaryBtn>
            <button onClick={()=>nav('home')}
                    style={{
                      width:'100%', marginTop:12, padding:'12px',
                      background:'transparent', border:'none',
                      fontSize:14, color:C.txtMuted, cursor:'pointer',
                      fontFamily:'Roboto,sans-serif',
                    }}>
              Cancel
            </button>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════
       APP — ROUTER
    ════════════════════════════════════════ */
    function App() {
      const [route, setRoute] = useState({ page:'login', p:{} });
      const nav = useCallback((page,p={})=>{
        setRoute({page,p});
        document.querySelector('.scroll-body')?.scrollTo(0,0);
      },[]);

      const screen = (()=>{
        switch(route.page){
          case 'login':    return <LoginScreen    nav={nav}/>;
          case 'pin':      return <PinScreen      nav={nav}/>;
          case 'home':     return <HomeScreen     nav={nav}/>;
          case 'card':     return <CardScreen     nav={nav} cid={route.p.cid}/>;
          case 'send':     return <SendScreen     nav={nav} cid={route.p.cid}/>;
          case 'confirm':  return <ConfirmScreen  nav={nav}/>;
          case 'success':  return <SuccessScreen  nav={nav}/>;
          case 'add-card': return <AddCardScreen  nav={nav}/>;
          default:         return <LoginScreen    nav={nav}/>;
        }
      })();

      return <div className="phone-shell">{screen}</div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
